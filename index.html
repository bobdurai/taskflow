<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ascend Drive - Project Management</title>
    <style>
        :root {
            --primary:       #0C2C4F;
            --primary-hover: #0a2540;
            --sidebar-acc:   #1B3D5C;
            --accent:        #1D556D;
            --accent-hover:  #1a4f66;
            --bg:            #F5F5F5;
            --card:          #FFFFFF;
            --border:        #D4D9E0;
            --muted-bg:      #EEF0F3;
            --muted-text:    #4A6580;
            --text:          #0C2C4F;
            --success:       #12B76A;
            --warning:       #F79009;
            --danger:        #F04438;
            --radius:        8px;
            --radius-lg:     12px;
            --shadow:        0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.06);
            --shadow-md:     0 4px 6px -1px rgba(0,0,0,.1),0 2px 4px -1px rgba(0,0,0,.06);
        }
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden;display:flex;}

        /* ── SIDEBAR ── */
        .sidebar{width:240px;background:var(--primary);color:#fff;height:100vh;display:flex;flex-direction:column;flex-shrink:0;}
        .sidebar-logo{padding:18px 20px;display:flex;align-items:center;gap:10px;border-bottom:1px solid rgba(255,255,255,.1);}
        .logo-icon{width:32px;height:32px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
        .logo-text{font-size:18px;font-weight:700;color:#fff;}
        .sidebar-nav{padding:12px 8px;flex:1;overflow-y:auto;}
        .sec-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:rgba(255,255,255,.35);padding:10px 12px 4px;}
        .nav-item{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:6px;cursor:pointer;color:rgba(255,255,255,.65);font-size:14px;font-weight:500;transition:all .15s;margin-bottom:2px;user-select:none;}
        .nav-item:hover{background:rgba(255,255,255,.08);color:#fff;}
        .nav-item.active{background:var(--accent);color:#fff;}
        .nav-icon{width:18px;text-align:center;flex-shrink:0;}
        .nav-badge{margin-left:auto;background:rgba(255,255,255,.15);color:rgba(255,255,255,.75);font-size:11px;padding:1px 7px;border-radius:99px;font-weight:600;}
        .proj-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
        .sidebar-footer{padding:12px;border-top:1px solid rgba(255,255,255,.1);}
        .user-info{display:flex;align-items:center;gap:10px;padding:8px;border-radius:8px;cursor:pointer;}
        .user-info:hover{background:rgba(255,255,255,.08);}

        /* ── MAIN ── */
        .main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
        .topbar{background:#fff;border-bottom:1px solid var(--border);padding:0 24px;height:60px;display:flex;align-items:center;gap:12px;flex-shrink:0;}
        .topbar-title{font-size:18px;font-weight:700;}
        .topbar-actions{margin-left:auto;display:flex;align-items:center;gap:8px;}
        .content{flex:1;overflow-y:auto;padding:24px;}

        /* ── BUTTONS ── */
        .btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:var(--radius);border:none;cursor:pointer;font-size:14px;font-weight:500;transition:all .15s;text-decoration:none;font-family:inherit;}
        .btn-primary{background:var(--primary);color:#fff;} .btn-primary:hover{background:var(--primary-hover);}
        .btn-accent{background:var(--accent);color:#fff;}   .btn-accent:hover{background:var(--accent-hover);}
        .btn-secondary{background:var(--muted-bg);color:var(--text);border:1px solid var(--border);} .btn-secondary:hover{background:var(--border);}
        .btn-ghost{background:transparent;color:var(--muted-text);} .btn-ghost:hover{background:var(--muted-bg);color:var(--text);}
        .btn-danger{background:var(--danger);color:#fff;}
        .btn-sm{padding:5px 12px;font-size:13px;}
        .btn-icon{padding:7px;}

        /* ── CARDS ── */
        .card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px;box-shadow:var(--shadow);}

        /* ── STATS ── */
        .stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px;}
        .stat-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px;box-shadow:var(--shadow);}
        .stat-label{font-size:13px;color:var(--muted-text);font-weight:500;margin-bottom:8px;}
        .stat-value{font-size:28px;font-weight:700;}
        .stat-sub{font-size:12px;margin-top:4px;color:var(--muted-text);}
        .stat-sub.green{color:var(--success);} .stat-sub.red{color:var(--danger);}

        /* ── KANBAN ── */
        .kanban-board{display:flex;gap:16px;height:calc(100vh - 148px);overflow-x:auto;padding-bottom:16px;}
        .k-col{min-width:272px;max-width:272px;display:flex;flex-direction:column;background:var(--muted-bg);border-radius:var(--radius-lg);border:1px solid var(--border);}
        .k-col-hdr{padding:12px 14px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border);flex-shrink:0;}
        .k-col-dot{width:8px;height:8px;border-radius:50%;}
        .k-col-title{font-size:13px;font-weight:700;}
        .k-col-count{background:var(--border);color:var(--muted-text);font-size:11px;font-weight:700;padding:1px 7px;border-radius:99px;}
        .k-tasks{flex:1;overflow-y:auto;padding:8px;display:flex;flex-direction:column;gap:7px;}
        .k-tasks.drag-over{background:rgba(29,85,109,.07);border-radius:8px;}
        .task-card{background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:12px;cursor:pointer;transition:all .15s;box-shadow:var(--shadow);}
        .task-card:hover{border-color:var(--accent);box-shadow:var(--shadow-md);transform:translateY(-1px);}
        .task-card.dragging{opacity:.45;transform:rotate(1.5deg);}
        .task-num{font-size:10px;font-weight:700;color:var(--accent);margin-bottom:3px;letter-spacing:.02em;}
        .task-title{font-size:13px;font-weight:600;color:var(--text);margin-bottom:8px;line-height:1.4;}
        .task-desc-preview{font-size:12px;color:var(--muted-text);margin-bottom:8px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
        .task-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
        .add-col-btn{display:flex;align-items:center;gap:6px;padding:8px 12px;margin:6px 8px 8px;border-radius:var(--radius);border:1px dashed var(--border);background:none;cursor:pointer;font-size:13px;color:var(--muted-text);width:calc(100% - 16px);transition:all .15s;font-family:inherit;}
        .add-col-btn:hover{background:#fff;border-color:var(--accent);color:var(--accent);}

        /* ── BADGES ── */
        .badge{display:inline-flex;align-items:center;padding:2px 7px;border-radius:99px;font-size:11px;font-weight:700;}
        .badge-high{background:#FEE4E2;color:#B42318;}
        .badge-medium{background:#FEF0C7;color:#B54708;}
        .badge-low{background:#D1FADF;color:#039855;}
        .badge-todo{background:var(--muted-bg);color:var(--muted-text);}
        .badge-in-progress{background:#EFF8FF;color:#175CD3;}
        .badge-review{background:#F4F3FF;color:#5925DC;}
        .badge-done{background:#D1FADF;color:#039855;}
        .badge-active{background:#EFF8FF;color:#175CD3;}
        .badge-completed{background:#D1FADF;color:#039855;}
        .dept-badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:99px;font-size:11px;font-weight:600;}

        /* ── AVATAR ── */
        .av{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0;}
        .av-sm{width:24px;height:24px;font-size:10px;}
        .av-md{width:32px;height:32px;font-size:13px;}
        .av-lg{width:44px;height:44px;font-size:16px;}

        /* ── PROJECT CARDS ── */
        .proj-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px;}
        .proj-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:0;cursor:pointer;transition:all .2s;box-shadow:var(--shadow);overflow:hidden;}
        .proj-card:hover{box-shadow:var(--shadow-md);transform:translateY(-2px);}
        .proj-card-top{height:4px;}
        .proj-card-body{padding:18px 20px 20px;}
        .proj-name{font-size:15px;font-weight:700;margin-bottom:5px;}
        .proj-desc{font-size:13px;color:var(--muted-text);margin-bottom:14px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;line-height:1.5;}
        .progress-bar{background:var(--muted-bg);border-radius:99px;height:5px;margin-bottom:7px;}
        .progress-fill{height:100%;border-radius:99px;transition:width .4s;}

        /* ── DUE DATE ── */
        .due{display:inline-flex;align-items:center;gap:3px;font-size:11px;color:var(--muted-text);}
        .due.overdue{color:var(--danger);}
        .due.soon{color:var(--warning);}

        /* ── MODAL ── */
        .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px;}
        .modal{background:#fff;border-radius:var(--radius-lg);box-shadow:0 20px 60px rgba(0,0,0,.3);max-width:640px;width:100%;max-height:88vh;overflow-y:auto;animation:modalIn .2s ease;}
        @keyframes modalIn{from{opacity:0;transform:scale(.96) translateY(-8px)}to{opacity:1;transform:scale(1) translateY(0)}}
        .modal-hdr{padding:20px 24px 16px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;gap:12px;}
        .modal-body{padding:20px 24px;}
        .modal-ftr{padding:14px 24px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px;}

        /* ── FORM ── */
        .fg{margin-bottom:14px;}
        .fl{display:block;font-size:13px;font-weight:600;color:var(--text);margin-bottom:5px;}
        .fi,.fs,.ft{width:100%;padding:8px 11px;border:1px solid var(--border);border-radius:var(--radius);font-size:14px;color:var(--text);background:#fff;transition:border-color .15s;font-family:inherit;}
        .fi:focus,.fs:focus,.ft:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(29,85,109,.1);}
        .ft{resize:vertical;min-height:78px;}

        /* ── MEMBER PICKER ── */
        .member-picker{display:flex;flex-direction:column;gap:2px;max-height:200px;overflow-y:auto;border:1px solid var(--border);border-radius:var(--radius);background:#fff;}
        .mp-dept-hdr{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted-text);padding:8px 10px 4px;background:var(--muted-bg);position:sticky;top:0;}
        .mp-item{display:flex;align-items:center;gap:8px;padding:7px 10px;cursor:pointer;transition:background .1s;}
        .mp-item:hover{background:var(--muted-bg);}
        .mp-item.selected{background:#EFF8FF;}
        .mp-item-name{font-size:13px;font-weight:500;}
        .mp-item-role{font-size:11px;color:var(--muted-text);}

        /* ── COMMENT ── */
        .comment{display:flex;gap:10px;margin-bottom:12px;}
        .cmt-body{flex:1;background:var(--muted-bg);border-radius:0 var(--radius) var(--radius) var(--radius);padding:10px 13px;}
        .cmt-author{font-size:12px;font-weight:700;margin-bottom:3px;}
        .cmt-text{font-size:13px;line-height:1.5;}
        .cmt-time{font-size:11px;color:var(--muted-text);margin-top:3px;}

        /* ── TEAM ── */
        .team-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;}
        .member-card{background:#fff;border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px;box-shadow:var(--shadow);transition:all .2s;position:relative;}
        .member-card:hover{box-shadow:var(--shadow-md);transform:translateY(-1px);}
        .dept-filter-bar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:20px;}
        .dept-tab{padding:5px 14px;border-radius:99px;font-size:13px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:#fff;color:var(--muted-text);transition:all .15s;font-family:inherit;}
        .dept-tab:hover{border-color:var(--accent);color:var(--accent);}
        .dept-tab.active{background:var(--primary);color:#fff;border-color:var(--primary);}
        .dept-stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin-bottom:24px;}
        .dept-stat-card{border-radius:var(--radius-lg);padding:16px;border-left:4px solid;}

        /* ── VIEW TOGGLE ── */
        .view-toggle{display:flex;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;}
        .vt-btn{padding:6px 10px;border:none;background:#fff;cursor:pointer;color:var(--muted-text);transition:all .15s;}
        .vt-btn.active{background:var(--primary);color:#fff;}
        .vt-btn:hover:not(.active){background:var(--muted-bg);}

        /* ── ACTIVITY ── */
        .act-item{display:flex;gap:10px;padding:9px 0;border-bottom:1px solid var(--border);}
        .act-item:last-child{border-bottom:none;}
        .act-dot{width:7px;height:7px;border-radius:50%;background:var(--accent);margin-top:5px;flex-shrink:0;}

        /* ── 2-COL ── */
        .two-col{display:grid;grid-template-columns:1fr 1fr;gap:24px;}
        .sec-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
        .sec-title{font-size:15px;font-weight:700;}

        /* ── EMPTY STATE ── */
        .empty{text-align:center;padding:60px 20px;}
        .empty-icon{font-size:44px;margin-bottom:14px;opacity:.4;}
        .empty-title{font-size:17px;font-weight:700;margin-bottom:6px;}
        .empty-desc{font-size:13px;color:var(--muted-text);}

        /* ── SCROLLBAR ── */
        ::-webkit-scrollbar{width:5px;height:5px;}
        ::-webkit-scrollbar-track{background:transparent;}
        ::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
        ::-webkit-scrollbar-thumb:hover{background:#aaa;}

        /* ── RESPONSIVE ── */
        @media(max-width:900px){.two-col{grid-template-columns:1fr;}.stats-grid{grid-template-columns:1fr 1fr;}}
        @media(max-width:600px){.sidebar{display:none;}.stats-grid{grid-template-columns:1fr 1fr;}}

        /* ── COLOR SWATCHES ── */
        .swatch{width:26px;height:26px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:border .12s;}
        .swatch.sel{border-color:var(--text);}

        /* ── REASSIGN SELECT ── */
        .reassign-sel{width:100%;padding:6px 8px;border:1px solid var(--border);border-radius:var(--radius);font-size:13px;color:var(--text);background:#fff;font-family:inherit;cursor:pointer;}
        .reassign-sel:focus{outline:none;border-color:var(--accent);}

        /* ── AUDIT TRAIL ── */
        .audit-entry{display:flex;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);}
        .audit-entry:last-child{border-bottom:none;}
        .audit-icon-box{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;background:var(--muted-bg);flex-shrink:0;}
        .audit-body{flex:1;}
        .audit-action-text{font-size:12px;font-weight:600;color:var(--text);}
        .audit-detail-text{font-size:11px;color:var(--muted-text);margin-top:1px;}
        .audit-when{font-size:10px;color:var(--muted-text);flex-shrink:0;padding-top:3px;}

        /* ── GANTT ── */
        .gantt-wrap{overflow-x:auto;background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);box-shadow:var(--shadow);}
        .gantt-container{min-width:800px;padding:16px;}
        .gantt-head{display:flex;border-bottom:2px solid var(--border);padding-bottom:8px;margin-bottom:2px;}
        .gantt-lbl-col{width:240px;flex-shrink:0;font-size:11px;font-weight:700;text-transform:uppercase;color:var(--muted-text);}
        .gantt-tl-head{flex:1;display:flex;}
        .gantt-week-mark{flex:1;font-size:10px;color:var(--muted-text);border-left:1px dashed var(--border);padding-left:4px;white-space:nowrap;}
        .gantt-row{display:flex;align-items:center;padding:5px 0;border-bottom:1px solid rgba(0,0,0,.04);}
        .gantt-task-info{width:240px;flex-shrink:0;display:flex;align-items:center;gap:6px;padding-right:12px;}
        .gantt-bar-area{flex:1;position:relative;height:26px;}
        .gantt-bar{position:absolute;height:20px;border-radius:4px;top:3px;display:flex;align-items:center;padding:0 6px;font-size:10px;font-weight:600;color:#fff;overflow:hidden;white-space:nowrap;cursor:pointer;min-width:6px;transition:opacity .15s;}
        .gantt-bar:hover{opacity:.85;}
        .gantt-today{position:absolute;top:0;bottom:0;width:2px;background:var(--danger);opacity:.6;z-index:2;}

        /* ── REPORTS ── */
        .report-row{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:24px;}
        .report-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px;box-shadow:var(--shadow);}
        .report-title{font-size:14px;font-weight:700;margin-bottom:16px;}
        .rbar-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
        .rbar-lbl{font-size:12px;min-width:120px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
        .rbar-track{flex:1;height:8px;background:var(--muted-bg);border-radius:99px;overflow:hidden;}
        .rbar-fill{height:100%;border-radius:99px;}
        .rbar-val{font-size:12px;font-weight:600;color:var(--muted-text);min-width:32px;text-align:right;}
    </style>
</head>

<div id="app"></div>

//  STATE  (merge saved state with SEED defaults)
// ─────────────────────────────────────────────
let S = (() => {
    try {
        const d = JSON.parse(localStorage.getItem('tf_state'));
        if (!d || !d.members) return JSON.parse(JSON.stringify(SEED));
        // Ensure new fields exist on loaded state
        if (!d.departments) d.departments = SEED.departments;
        if (d.teamDept === undefined) d.teamDept = 'all';
        if (d.editMemberId === undefined) d.editMemberId = null;
        // Ensure members have department field
        d.members.forEach(m => { if (!m.department) m.department = 'IT'; });
        // Ensure tasks have num field
        if (!d.taskCounter) d.taskCounter = (d.tasks?.length || 0) + 1;
        d.tasks?.forEach((t, i) => { if (!t.num) t.num = i + 1; if (!t.auditLog) t.auditLog = []; });
        return d;
    } catch { return JSON.parse(JSON.stringify(SEED)); }
})();
function save(){ try { localStorage.setItem('tf_state', JSON.stringify(S)); } catch {} }

const uid     = p => p + Date.now() + Math.random().toString(36).slice(2,6);
const fmtNum  = n => '#' + String(n||0).padStart(3,'0');
const gMem    = id => S.members.find(m=>m.id===id);
const gPrj    = id => S.projects.find(p=>p.id===id);
const gTsk    = id => S.tasks.find(t=>t.id===id);
const prjTasks= id => S.tasks.filter(t=>t.projectId===id);
const colTasks= (pid,col) => prjTasks(pid).filter(t=>t.status===col);
const progress= pid => { const ts=prjTasks(pid); if(!ts.length)return 0; return Math.round(ts.filter(t=>t.status==='done').length/ts.length*100); };
const fmtDate = s => { if(!s)return ''; return new Date(s).toLocaleDateString('en-US',{month:'short',day:'numeric'}); };
const overdue = s => s && new Date(s)<new Date();
const soon    = s => { if(!s)return false; const d=new Date(s),n=new Date(); return d>n && (d-n)<3*86400000; };
const dueClass= (s,done) => done?'':overdue(s)?'overdue':soon(s)?'soon':'';

const deptPal = d => DEPT_PALETTE[d] || {bg:'#F8FAFC',text:'#344054',border:'#D0D5DD'};
const deptMembers = d => S.members.filter(m=>m.department===d);

// Members grouped by dept (only depts that have members)
function membersByDept(){
    const map = {};
    S.members.forEach(m=>{
        if(!map[m.department]) map[m.department]=[];
        map[m.department].push(m);
    });
    return map;
}

function avHtml(mem, cls='av-md'){
    if(!mem) return `<div class="av ${cls}" style="background:#ccc;color:#fff">?</div>`;
    return `<div class="av ${cls}" style="background:${mem.color};color:#fff">${mem.initials}</div>`;
}

function deptBadge(dept){
    if(!dept) return '';
    const p=deptPal(dept);
    return `<span class="dept-badge" style="background:${p.bg};color:${p.text};border:1px solid ${p.border}">${dept}</span>`;
}

function actPush(text){ S.activities.unshift({id:uid('a'),text,time:'Just now'}); if(S.activities.length>30) S.activities.pop(); }
function auditPush(task,action,detail){
    if(!task.auditLog) task.auditLog=[];
    const ts=new Date().toLocaleString('en-US',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});
    task.auditLog.unshift({id:uid('al'),userId:S.currentUser,action,detail,ts});
}

    return `<div class="kanban-board" id="kb">
        ${COLUMNS.map(col=>{
            const ts=colTasks(S.projectId,col.id);
            return `<div class="k-col">
                <div class="k-col-hdr">
                    <div class="k-col-dot" style="background:${col.color}"></div>
                    <div class="k-col-title">${col.label}</div>
                    <div class="k-col-count">${ts.length}</div>
                    <button class="btn btn-ghost btn-icon btn-sm" style="margin-left:auto;padding:4px" data-action="add-task" data-status="${col.id}">
                        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                    </button>
                </div>
                <div class="k-tasks" data-col="${col.id}"
                    ondragover="dOver(event)" ondrop="dDrop(event,'${col.id}')" ondragleave="dLeave(event)">

function tCard(t){
    const m=gMem(t.assigneeId); const nc=t.comments?.length||0;
    const p=m?deptPal(m.department):null;
    return `<div class="task-card" draggable="true" data-task-id="${t.id}" data-open-task="${t.id}"
        ondragstart="dStart(event,'${t.id}')">
        <div class="task-num">${fmtNum(t.num)}</div>
        <div class="task-title">${t.title}</div>
        ${t.description?`<div class="task-desc-preview">${t.description}</div>`:''}
        <div class="task-meta">
            <span class="badge badge-${t.priority}">${t.priority}</span>
            ${t.dueDate?`<div class="due ${dueClass(t.dueDate,t.status==='done')}">📅 ${fmtDate(t.dueDate)}</div>`:''}
            ${nc>0?`<div style="font-size:11px;color:var(--muted-text);margin-left:auto">💬 ${nc}</div>`:''}
            ${m?`<div style="margin-left:auto;display:flex;align-items:center;gap:4px">
                ${avHtml(m,'av-sm')}
                ${p?`<span style="font-size:10px;font-weight:600;color:${p.text}">${m.department}</span>`:''}
            </div>`:''}
        </div>
    </div>`;
}

// ── GANTT ──
function vGantt(){
    if(!S.projectId) return `<div class="empty"><div class="empty-icon">📊</div><div class="empty-title">No project selected</div><div class="empty-desc">Pick a project from the sidebar</div></div>`;
    const tasks = prjTasks(S.projectId).filter(t=>t.startDate||t.dueDate);
    if(!tasks.length) return `<div class="empty"><div class="empty-icon">📅</div><div class="empty-title">No dates set</div><div class="empty-desc">Add start and due dates to tasks to see the Gantt chart</div></div>`;

    // Compute date range
    const allDates = tasks.flatMap(t=>[t.startDate,t.dueDate].filter(Boolean)).map(d=>new Date(d));
    let minD = new Date(Math.min(...allDates)); minD.setDate(minD.getDate()-3);
    let maxD = new Date(Math.max(...allDates)); maxD.setDate(maxD.getDate()+3);
    const totalMs = maxD - minD;
    const totalDays = totalMs / 86400000;
    const today = new Date();

    // Week markers across the range
    const weeks = [];
    let wk = new Date(minD);
    wk.setDate(wk.getDate() - wk.getDay()); // align to Sunday
    while(wk <= maxD){ weeks.push(new Date(wk)); wk.setDate(wk.getDate()+7); }

    const pct = d => Math.max(0, Math.min(100, (new Date(d)-minD)/totalMs*100));
    const statusColor = s => ({todo:'#94A3B8','in-progress':'#3B82F6',review:'#8B5CF6',done:'#10B981'}[s]||'#94A3B8');

    const todayPct = (today-minD)/totalMs*100;

    const weekHeaders = weeks.map(w=>`<div class="gantt-week-mark" style="left:${pct(w)}%">${w.toLocaleDateString('en-US',{month:'short',day:'numeric'})}</div>`).join('');

    const rows = tasks.map(t=>{
        const sd = t.startDate || t.dueDate;
        const ed = t.dueDate   || t.startDate;
        const left  = pct(sd);
        const width = Math.max(0.8, pct(ed) - left);
        const days  = t.startDate&&t.dueDate ? Math.ceil((new Date(t.dueDate)-new Date(t.startDate))/86400000) : null;
        const m = gMem(t.assigneeId);
        return `<div class="gantt-row">
            <div class="gantt-task-info">
                <span style="font-size:10px;font-weight:700;color:var(--accent);min-width:30px">${fmtNum(t.num)}</span>
                <span style="font-size:12px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;cursor:pointer" data-open-task="${t.id}" title="${t.title}">${t.title}</span>
            </div>
            <div class="gantt-bar-area">
                ${todayPct>=0&&todayPct<=100?`<div class="gantt-today" style="left:${todayPct}%"></div>`:''}
                <div class="gantt-bar" style="left:${left}%;width:${width}%;background:${statusColor(t.status)}"
                    data-open-task="${t.id}" title="${t.title} · ${days?days+' days':''}">
                    ${width>8?`${fmtNum(t.num)} ${days?days+'d':''}`:'' }
                </div>
            </div>
        </div>`;
    }).join('');

    return `<div>
        <div style="display:flex;align-items:center;gap:16px;margin-bottom:14px;flex-wrap:wrap">
            ${[{id:'todo',label:'To Do',color:'#94A3B8'},{id:'in-progress',label:'In Progress',color:'#3B82F6'},{id:'review',label:'In Review',color:'#8B5CF6'},{id:'done',label:'Done',color:'#10B981'}].map(c=>`
                <div style="display:flex;align-items:center;gap:5px;font-size:12px">
                    <div style="width:10px;height:10px;border-radius:2px;background:${c.color}"></div>${c.label}
                </div>`).join('')}
            <div style="font-size:12px;display:flex;align-items:center;gap:5px"><div style="width:2px;height:14px;background:var(--danger);opacity:.7"></div>Today</div>
        </div>
        <div class="gantt-wrap">
            <div class="gantt-container">
                <div class="gantt-head">
                    <div class="gantt-lbl-col">Task</div>
                    <div class="gantt-tl-head" style="position:relative;height:20px">${weekHeaders}</div>
                </div>
                ${rows}
            </div>
        </div>
    </div>`;
}

// ── MY TASKS ──
function vMyTasks(){
    const mine=S.tasks.filter(t=>t.assigneeId===S.currentUser);
    const g={overdue:mine.filter(t=>t.status!=='done'&&overdue(t.dueDate)),soon:mine.filter(t=>t.status!=='done'&&!overdue(t.dueDate)&&soon(t.dueDate)),upcoming:mine.filter(t=>t.status!=='done'&&!overdue(t.dueDate)&&!soon(t.dueDate)),done:mine.filter(t=>t.status==='done')};
    const sec=(label,ts,col)=>{
        if(!ts.length) return '';
        return `<div style="margin-bottom:20px">
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
                <div style="width:8px;height:8px;border-radius:50%;background:${col}"></div>
                <div style="font-size:14px;font-weight:700">${label}</div><div class="k-col-count">${ts.length}</div>
            </div>
            <div class="card" style="padding:0;overflow:hidden">
                ${ts.map(t=>{const p=gPrj(t.projectId);return `<div style="padding:11px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;cursor:pointer" data-open-task="${t.id}">
                    <span style="font-size:10px;font-weight:700;color:var(--accent);min-width:36px">${fmtNum(t.num)}</span>
                    <div style="width:7px;height:7px;border-radius:50%;background:${p?.color};flex-shrink:0"></div>
                    <div style="flex:1"><div style="font-size:13px;font-weight:500;${t.status==='done'?'text-decoration:line-through;color:var(--muted-text)':''}">${t.title}</div><div style="font-size:11px;color:var(--muted-text)">${p?.name}</div></div>
                    <span class="badge badge-${t.priority}">${t.priority}</span>
                    <span class="badge badge-${t.status}">${t.status.replace('-',' ')}</span>
                    ${t.dueDate?`<div class="due ${dueClass(t.dueDate,t.status==='done')}">${fmtDate(t.dueDate)}</div>`:''}
                </div>`;}).join('')}
            </div>
        </div>`;
    };
    if(!mine.length) return `<div class="empty"><div class="empty-icon">✅</div><div class="empty-title">No tasks assigned</div><div class="empty-desc">Tasks assigned to you will appear here</div></div>`;
    return sec('⚠️ Overdue',g.overdue,'var(--danger)')+sec('⏰ Due Soon',g.soon,'var(--warning)')+sec('📋 Upcoming',g.upcoming,'var(--accent)')+sec('✅ Completed',g.done,'var(--success)');
}

// ── REPORTS ──
function vReports(){
    const allTasks = S.tasks;
    const done     = allTasks.filter(t=>t.status==='done');
    const inprog   = allTasks.filter(t=>t.status==='in-progress');
    const overdueTasks = allTasks.filter(t=>t.status!=='done'&&overdue(t.dueDate));

    // Duration: tasks that have both startDate and dueDate
    const withDuration = allTasks.filter(t=>t.startDate&&t.dueDate);
    const avgDuration  = withDuration.length
        ? Math.round(withDuration.reduce((s,t)=>s+Math.max(1,Math.ceil((new Date(t.dueDate)-new Date(t.startDate))/86400000)),0)/withDuration.length)
        : null;

    // On-time: done tasks where dueDate >= completedAt (we don't track completedAt, so check if dueDate is not in past by much — proxy: done before overdue)
    const onTime = done.filter(t=>t.dueDate && new Date(t.dueDate) >= new Date(t.dueDate)).length; // all done tasks count as on-time for now

    // Per-project stats
    const projRows = S.projects.map(p=>{
        const pts = prjTasks(p.id);
        const pDone = pts.filter(t=>t.status==='done').length;
        const pct = pts.length ? Math.round(pDone/pts.length*100) : 0;
        const withD = pts.filter(t=>t.startDate&&t.dueDate);
        const avgD = withD.length ? Math.round(withD.reduce((s,t)=>s+Math.max(1,Math.ceil((new Date(t.dueDate)-new Date(t.startDate))/86400000)),0)/withD.length) : null;
        return {p,pts,pDone,pct,avgD};
    });

    // Per-member workload
    const memberRows = S.members.map(m=>{
        const mt = allTasks.filter(t=>t.assigneeId===m.id);
        const mDone = mt.filter(t=>t.status==='done').length;
        const mActive = mt.filter(t=>t.status!=='done').length;
        return {m,total:mt.length,done:mDone,active:mActive};
    }).filter(r=>r.total>0).sort((a,b)=>b.total-a.total);
    const maxMemberTasks = Math.max(1,...memberRows.map(r=>r.total));

    // Status distribution
    const statusCounts = COLUMNS.map(c=>({...c, count:allTasks.filter(t=>t.status===c.id).length}));
    const maxCount = Math.max(1,...statusCounts.map(s=>s.count));

    return `
    <div class="stats-grid">
        <div class="stat-card"><div class="stat-label">Total Tasks</div><div class="stat-value">${allTasks.length}</div><div class="stat-sub">${done.length} completed</div></div>
        <div class="stat-card"><div class="stat-label">Avg Task Duration</div><div class="stat-value">${avgDuration??'—'}${avgDuration?'<span style="font-size:16px;font-weight:400"> days</span>':''}</div><div class="stat-sub">${withDuration.length} tasks with dates</div></div>
        <div class="stat-card"><div class="stat-label">In Progress</div><div class="stat-value">${inprog.length}</div><div class="stat-sub">${Math.round(inprog.length/Math.max(1,allTasks.length)*100)}% of all tasks</div></div>
        <div class="stat-card"><div class="stat-label">Overdue</div><div class="stat-value" style="${overdueTasks.length?'color:var(--danger)':''}">${overdueTasks.length}</div><div class="stat-sub ${overdueTasks.length?'red':''}">${overdueTasks.length?'Need attention':'All on track'}</div></div>
    </div>

    <div class="report-row">
        <div class="report-card">
            <div class="report-title">📁 Project Completion</div>
            ${projRows.map(({p,pts,pDone,pct,avgD})=>`
            <div class="rbar-row">
                <div class="rbar-lbl" title="${p.name}">${p.name}</div>
                <div class="rbar-track"><div class="rbar-fill" style="width:${pct}%;background:${p.color}"></div></div>
                <div class="rbar-val">${pct}%</div>
                ${avgD?`<div style="font-size:11px;color:var(--muted-text);margin-left:6px;white-space:nowrap">${avgD}d avg</div>`:''}
            </div>`).join('')}
        </div>
        <div class="report-card">
            <div class="report-title">👤 Team Workload</div>
            ${memberRows.map(({m,total,done:d,active})=>`
            <div class="rbar-row">
                <div style="display:flex;align-items:center;gap:6px;min-width:120px;flex-shrink:0">
                    ${avHtml(m,'av-sm')}
                    <span class="rbar-lbl" style="min-width:0" title="${m.name}">${m.name.split(' ')[0]}</span>
                </div>
                <div class="rbar-track">
                    <div style="height:100%;display:flex;border-radius:99px;overflow:hidden">
                        <div style="width:${Math.round(d/maxMemberTasks*100)}%;background:var(--success)"></div>
                        <div style="width:${Math.round(active/maxMemberTasks*100)}%;background:var(--accent)"></div>
                    </div>
                </div>
                <div class="rbar-val">${total}</div>
            </div>`).join('')}
            <div style="display:flex;gap:16px;margin-top:10px;font-size:11px;color:var(--muted-text)">
                <div style="display:flex;align-items:center;gap:4px"><div style="width:8px;height:8px;border-radius:2px;background:var(--success)"></div>Done</div>
                <div style="display:flex;align-items:center;gap:4px"><div style="width:8px;height:8px;border-radius:2px;background:var(--accent)"></div>Active</div>
            </div>
        </div>
    </div>

    <div class="report-row">
        <div class="report-card">
            <div class="report-title">📊 Task Status Breakdown</div>
            ${statusCounts.map(s=>`
            <div class="rbar-row">
                <div style="display:flex;align-items:center;gap:6px;min-width:120px;flex-shrink:0">
                    <div style="width:8px;height:8px;border-radius:50%;background:${s.color}"></div>
                    <span class="rbar-lbl" style="min-width:0">${s.label}</span>
                </div>
                <div class="rbar-track"><div class="rbar-fill" style="width:${Math.round(s.count/maxCount*100)}%;background:${s.color}"></div></div>
                <div class="rbar-val">${s.count}</div>
            </div>`).join('')}
        </div>
        <div class="report-card">
            <div class="report-title">⏱ Duration by Project</div>
            ${projRows.filter(r=>r.avgD).length ? projRows.filter(r=>r.avgD).map(({p,avgD})=>{
                const maxAvg = Math.max(...projRows.filter(r=>r.avgD).map(r=>r.avgD));
                return `<div class="rbar-row">
                    <div class="rbar-lbl" title="${p.name}">${p.name}</div>
                    <div class="rbar-track"><div class="rbar-fill" style="width:${Math.round(avgD/maxAvg*100)}%;background:${p.color}"></div></div>
                    <div class="rbar-val">${avgD}d</div>
                </div>`;
            }).join('') : '<div style="font-size:13px;color:var(--muted-text)">Add start dates to tasks to see duration data.</div>'}
            ${overdueTasks.length?`
            <div style="margin-top:16px;padding-top:14px;border-top:1px solid var(--border)">
                <div style="font-size:12px;font-weight:700;color:var(--danger);margin-bottom:8px">⚠️ Overdue Tasks (${overdueTasks.length})</div>
                ${overdueTasks.slice(0,5).map(t=>{
                    const days=Math.ceil((new Date()-new Date(t.dueDate))/86400000);
                    return `<div style="display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--border);font-size:12px">
                        <span style="font-weight:700;color:var(--accent)">${fmtNum(t.num)}</span>

                    </div>`;
                }).join('')}
            </div>`:''}
        </div>
    </div>`;
}

// ─────────────────────────────────────────────
//  BIND EVENTS
// ─────────────────────────────────────────────
function bind(){
    // Nav
    document.querySelectorAll('[data-nav]').forEach(el=>el.addEventListener('click',()=>{
        S.view=el.dataset.nav;
        if(el.dataset.pid) S.projectId=el.dataset.pid;
        render();
    }));
    // Actions
    document.querySelectorAll('[data-action]').forEach(el=>el.addEventListener('click',e=>{
        e.stopPropagation();
        const a=el.dataset.action;
        if(a==='add-project'){S.modal='add-project';}
        else if(a==='add-task'){S.modal='add-task';S.modalData={status:el.dataset.status||'todo'};}
        else if(a==='add-member'){S.modal='add-member';}
        render();
    }));
    // Edit member
    document.querySelectorAll('[data-editm]').forEach(el=>el.addEventListener('click',e=>{
        e.stopPropagation();
        S.editMemberId=el.dataset.editm; S.modal='edit-member'; render();
    }));
    // Open task
    document.querySelectorAll('[data-open-task]').forEach(el=>el.addEventListener('click',e=>{
        if(e.target.closest('[data-action]')||e.target.closest('[data-close]')||e.target.closest('[data-editm]')) return;
        S.modal='task-detail'; S.taskId=el.dataset.openTask; render();
    }));
    // Close modal
    document.querySelectorAll('[data-close]').forEach(el=>el.addEventListener('click',()=>{S.modal=null;S.taskId=null;S.modalData=null;S.editMemberId=null;render();}));
    // Click outside
    const ov=document.getElementById('moverlay');
    if(ov) ov.addEventListener('click',e=>{if(e.target===ov){S.modal=null;S.taskId=null;S.editMemberId=null;render();}});
    // Task view toggle
    document.querySelectorAll('[data-tv]').forEach(el=>el.addEventListener('click',()=>{S.taskView=el.dataset.tv;render();}));
    // New dept toggle in Add Member
    const mdept=document.getElementById('mdept');
    if(mdept) mdept.addEventListener('change',()=>{
        const row=document.getElementById('new-dept-row');
        if(row) row.style.display=mdept.value==='__new__'?'block':'none';
    });
    // New dept toggle in Edit Member
    const emdept=document.getElementById('emdept');
    if(emdept) emdept.addEventListener('change',()=>{
        const row=document.getElementById('edit-new-dept-row');
        if(row) row.style.display=emdept.value==='__new__'?'block':'none';
    });
}

function setTeamDept(d){ S.teamDept=d; save(); render(); }

function doCreateProject(){
    const name=(document.getElementById('pn')?.value||'').trim();
    if(!name){alert('Please enter a project name');return;}
    const p={id:uid('p'),name,description:document.getElementById('pd')?.value||'',color:document.getElementById('pc')?.value||COLORS[0],status:'active',dueDate:document.getElementById('pdd')?.value||'',memberIds:(document.getElementById('pm')?.value||'').split(',').filter(Boolean)};
    S.projects.push(p);
    actPush(`${gMem(S.currentUser)?.name} created project "${name}"`);
    S.modal=null; S.view='kanban'; S.projectId=p.id;
    save(); render();
}

function doCreateTask(){
    const title=(document.getElementById('tt')?.value||'').trim();
    if(!title){alert('Please enter a task title');return;}
    const assigneeId=document.getElementById('ta')?.value||'';
    const num=S.taskCounter++;
    const t={id:uid('t'),num,projectId:S.projectId,title,description:document.getElementById('td')?.value||'',status:document.getElementById('ts')?.value||'todo',priority:document.getElementById('tp')?.value||'medium',assigneeId,startDate:document.getElementById('tsd')?.value||'',dueDate:document.getElementById('tdd')?.value||'',comments:[],auditLog:[]};
    auditPush(t,'created','Task created');
    if(assigneeId) auditPush(t,'assigned','Assigned to '+(gMem(assigneeId)?.name||'someone'));
    S.tasks.push(t);
    const assignee=gMem(assigneeId);
    actPush(`${gMem(S.currentUser)?.name} created task "${title}"${assignee?' → assigned to '+assignee.name:''}`);
    S.modal=null; S.modalData=null;
    save(); render();
}

function doReassign(taskId, newId){
    const t=gTsk(taskId); if(!t) return;
    const oldMem=gMem(t.assigneeId);
    const newMem=gMem(newId);
    t.assigneeId=newId;
    auditPush(t,'assigned',(oldMem?oldMem.name:'Unassigned')+' → '+(newMem?newMem.name:'Unassigned'));
    actPush(`${gMem(S.currentUser)?.name} reassigned "${t.title}" ${oldMem?'from '+oldMem.name:''} to ${newMem?newMem.name:'Unassigned'}`);
    save(); render();
}

function doComment(taskId){
    const inp=document.getElementById('ci');
    const text=(inp?.value||'').trim(); if(!text) return;
    const t=gTsk(taskId); if(!t) return;
    if(!t.comments) t.comments=[];
    t.comments.push({id:uid('c'),userId:S.currentUser,text,createdAt:'Just now'});
    auditPush(t,'comment','Added a comment');
    actPush(`${gMem(S.currentUser)?.name} commented on "${t.title}"`);
    save(); render();
}

function doStatus(taskId,newStatus){
    const t=gTsk(taskId); if(!t) return;
    const oldCol=COLUMNS.find(c=>c.id===t.status);
    t.status=newStatus;
    const col=COLUMNS.find(c=>c.id===newStatus);
    auditPush(t,'status',(oldCol?.label||t.status)+' → '+(col?.label||newStatus));
    actPush(`${gMem(S.currentUser)?.name} moved "${t.title}" to ${col?.label}`);
    save(); render();
}

function doDelete(taskId){
    if(!confirm('Delete this task? This cannot be undone.')) return;
    S.tasks=S.tasks.filter(t=>t.id!==taskId);
    S.modal=null; S.taskId=null;
    save(); render();
}

function doAddMember(){
    const name=(document.getElementById('mn')?.value||'').trim();
    if(!name){alert('Please enter a name');return;}
    let dept=document.getElementById('mdept')?.value||'';
    if(dept==='__new__'){
        dept=(document.getElementById('newdept')?.value||'').trim();
        if(!dept){alert('Please enter a department name');return;}
        if(!S.departments.includes(dept)) S.departments.push(dept);
    }
    if(!dept){alert('Please select a department');return;}
    const ini=name.split(' ').map(n=>n[0]).join('').toUpperCase().slice(0,2);
    S.members.push({id:uid('m'),name,role:document.getElementById('mr')?.value||'Team Member',email:document.getElementById('me2')?.value||'',initials:ini,color:COLORS[S.members.length%COLORS.length],department:dept});
    actPush(`${gMem(S.currentUser)?.name} added ${name} to ${dept}`);
    S.modal=null; save(); render();
}

function doEditMember(id){
    const m=gMem(id); if(!m) return;
    const name=(document.getElementById('emn')?.value||'').trim();
    if(!name){alert('Please enter a name');return;}
    let dept=document.getElementById('emdept')?.value||'';
    if(dept==='__new__'){
        dept=(document.getElementById('editnewdept')?.value||'').trim();
        if(!dept){alert('Please enter a department name');return;}
        if(!S.departments.includes(dept)) S.departments.push(dept);
    }
    m.name=name;
    m.role=document.getElementById('emr')?.value||m.role;
    m.email=document.getElementById('eme')?.value||m.email;
    m.department=dept||m.department;
    m.initials=name.split(' ').map(n=>n[0]).join('').toUpperCase().slice(0,2);
    actPush(`${gMem(S.currentUser)?.name} updated member "${name}"`);
    S.modal=null; S.editMemberId=null;
    save(); render();
}

function doDeleteMember(id){
    if(!confirm('Remove this member? Their tasks will become unassigned.')) return;
    S.tasks.forEach(t=>{ if(t.assigneeId===id) t.assigneeId=''; });
    S.projects.forEach(p=>{ p.memberIds=p.memberIds.filter(mid=>mid!==id); });
    const name=gMem(id)?.name||'Member';
    S.members=S.members.filter(m=>m.id!==id);
    actPush(`${gMem(S.currentUser)?.name} removed ${name} from the team`);
    S.modal=null; S.editMemberId=null;
    save(); render();
}

// ─────────────────────────────────────────────
//  DRAG & DROP
// ─────────────────────────────────────────────
let dragId=null;
function dStart(e,id){dragId=id;e.target.classList.add('dragging');e.dataTransfer.effectAllowed='move';}
function dOver(e){e.preventDefault();e.dataTransfer.dropEffect='move';e.currentTarget.classList.add('drag-over');}
function dLeave(e){e.currentTarget.classList.remove('drag-over');}
function dDrop(e,col){
    e.preventDefault(); e.currentTarget.classList.remove('drag-over');
    if(!dragId) return;
    const t=gTsk(dragId);
    if(t&&t.status!==col){
        const oldC=COLUMNS.find(x=>x.id===t.status);
        t.status=col;
        const c=COLUMNS.find(x=>x.id===col);
        auditPush(t,'status',(oldC?.label||'Unknown')+' → '+(c?.label||col));
        actPush(`${gMem(S.currentUser)?.name} moved "${t.title}" to ${c?.label}`);
        save(); render();
    }
    dragId=null;
}

// ─────────────────────────────────────────────
//  COLOR SWATCH / MEMBER TOGGLE
// ─────────────────────────────────────────────
function swPick(c,el){
    document.querySelectorAll('.swatch').forEach(s=>s.classList.remove('sel'));
    el.classList.add('sel');
    document.getElementById('pc').value=c;
}
let _mSel=[];
function mToggle(id,el){
    const i=_mSel.indexOf(id);
    const check=el.querySelector('[data-check]');
    if(i===-1){
        _mSel.push(id);
        el.classList.add('selected');
        if(check) check.style.display='block';
    } else {
        _mSel.splice(i,1);
        el.classList.remove('selected');
        if(check) check.style.display='none';
    }
    document.getElementById('pm').value=_mSel.join(',');
}

// Assignee preview in add-task modal
function previewAssignee(id){
    const m=gMem(id);
    const el=document.getElementById('assignee-preview');
    if(!el) return;
    if(!m){el.style.display='none';return;}
    el.style.display='flex';
    const avEl=document.getElementById('ap-av');
    const nmEl=document.getElementById('ap-name');
    const dpEl=document.getElementById('ap-dept');
    if(avEl) avEl.innerHTML=avHtml(m,'av-md');
    if(nmEl) nmEl.textContent=m.name+' · '+m.role;
    if(dpEl){
        const p=deptPal(m.department);
        dpEl.innerHTML=m.department?`<span class="dept-badge" style="background:${p.bg};color:${p.text};border:1px solid ${p.border}">${m.department}</span>`:'';
    }
}

// ─────────────────────────────────────────────
render();
